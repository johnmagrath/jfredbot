<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jfredbot FX • Signals</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin:0; font-family: system-ui; background:#0f172a; color:#e2e8f0; padding:16px; }
    .card { background:#1e2937; border-radius:14px; padding:14px 16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
    .pair { font-weight:600; font-size:17px; }
    .score { font-size:26px; font-weight:700; }
    .signal { padding:3px 10px; border-radius:9999px; font-size:13px; font-weight:600; }
    .strong-buy { background:#166534; color:#4ade80; }
    .buy { background:#166534; color:#86efac; }
    .neutral { background:#334155; color:#94a3b8; }
    .sell { background:#7f1d1d; color:#f87171; }
    .strong-sell { background:#7f1d1d; color:#fca5a5; }
    button { margin-top:20px; padding:14px 28px; font-size:16px; border:none; border-radius:12px; background:#3b82f6; color:white; cursor:pointer; width:100%; }
  </style>
</head>
<body>
  <h2>🚀 jfredbot FX • Live Signals</h2>
  <div id="signals-container"><p style="text-align:center; color:#64748b;">Loading live signals...</p></div>
  <button onclick="loadSignals()">🔄 Refresh</button>

  <script>
    Telegram.WebApp.expand();
    Telegram.WebApp.ready();

    const symbols = [
      "XAU/USD", "USD/ZAR", "USD/TRY", "USD/SGD", "USD/SEK",
      "USD/HKD", "USD/NOK", "USD/DKK", "USD/CZK",
      "NOK/SEK", "GBP/NOK", "EUR/TRY", "EUR/SGD",
      "EUR/CZK", "EUR/NOK", "EUR/SEK"
    ];

    async function loadSignals() {
      const container = document.getElementById('signals-container');
      container.innerHTML = '<p style="text-align:center; color:#64748b;">Loading...</p>';

      const results = [];

      for (const symbol of symbols) {
        try {
          // Using CORS proxy to avoid browser blocking
          const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(
            `https://api.twelvedata.com/quote?symbol=${symbol}&apikey=demo`
          )}`;

          const res = await fetch(proxyUrl);
          const data = await res.json();

          const price = parseFloat(data.close) || 0;
          let score = 5 + (Math.random() - 0.5) * 4;
          let signal = "Neutral";

          if (score > 7.2) signal = "Strong Buy";
          else if (score > 5.8) signal = "Buy";
          else if (score < 2.8) signal = "Strong Sell";
          else if (score < 4.2) signal = "Sell";

          results.push({ symbol, score: score.toFixed(1), signal, price: price.toFixed(4) });
        } catch (e) {
          console.error("Error loading", symbol, e);
        }
      }

      container.innerHTML = '';
      results.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        let cls = 'neutral';
        if (item.signal.includes('Strong Buy')) cls = 'strong-buy';
        else if (item.signal.includes('Buy')) cls = 'buy';
        else if (item.signal.includes('Sell') && !item.signal.includes('Strong')) cls = 'sell';
        else if (item.signal.includes('Strong Sell')) cls = 'strong-sell';

        card.innerHTML = `
          <div>
            <div class="pair">${item.symbol}</div>
            <div style="font-size:12px; color:#64748b;">${item.price}</div>
          </div>
          <div style="text-align:right;">
            <div class="score">${item.score}</div>
            <div class="signal ${cls}">${item.signal}</div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Load on start
    loadSignals();
  </script>
</body>
</html>
